apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: payment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: payment

  template:
    metadata:
      labels:
        app: payment

    spec:
      containers:

      - name: cpu-stress

        image: busybox

        command:
        - sh
        - -c
        - |
          while true
          do
            yes > /dev/null
          done

        resources:

          requests:
            cpu: "1000m"
            memory: "128Mi"

          limits:
            cpu: "1000m"
            memory: "256Mi"
